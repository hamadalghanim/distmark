version: "3.9"

# ── Products nodes (atomic broadcast, 5 replicas) ─────────────────────────────
x-products-node-env: &products-node-env
  RAFT_ADDRS: "products-node0:7000,products-node1:7001,products-node2:7002,products-node3:7003,products-node4:7004"
  DB_USER: "user"
  DB_PASS: "pass"
  DB_PORT: "5432"
  DB_NAME: "products"

x-products-pg-env: &products-pg-env
  POSTGRES_USER: "user"
  POSTGRES_PASSWORD: "pass"
  POSTGRES_DB: "products"

x-products-pg-hc: &products-pg-hc
  test: ["CMD-SHELL", "pg_isready -U user -d products"]
  interval: 5s
  timeout: 3s
  retries: 10

x-products-node-hc: &products-node-hc
  test: ["CMD", "python", "-c",
         "import socket; s = socket.create_connection(('localhost', 5000), timeout=2); s.close()"]
  interval: 5s
  timeout: 3s
  retries: 10

# ── Customers nodes (atomic broadcast, 5 replicas) ────────────────────────────
x-customers-node-env: &customers-node-env
  N_MEMBERS: "5"
  PEER_ADDRS: "customers-node0:6100,customers-node1:6101,customers-node2:6102,customers-node3:6103,customers-node4:6104"
  DB_USER: "user"
  DB_PASS: "pass"
  DB_PORT: "5432"
  DB_NAME: "customers"

x-customers-pg-env: &customers-pg-env
  POSTGRES_USER: "user"
  POSTGRES_PASSWORD: "pass"
  POSTGRES_DB: "customers"

x-customers-pg-hc: &customers-pg-hc
  test: ["CMD-SHELL", "pg_isready -U user -d customers"]
  interval: 5s
  timeout: 3s
  retries: 10

x-customers-node-hc: &customers-node-hc
  test: ["CMD", "python", "-c",
         "import socket; s = socket.create_connection(('localhost', 5000), timeout=2); s.close()"]
  interval: 5s
  timeout: 3s
  retries: 10

services:
  seller-frontend:
    build: seller-frontend
    ports:
      - "8000:5000"
    depends_on:
      products-node0:
        condition: service_healthy
      products-node1:
        condition: service_healthy
      products-node2:
        condition: service_healthy
      products-node3:
        condition: service_healthy
      products-node4:
        condition: service_healthy
    environment:
      PRODUCTS_RPC_ADDRS: "products-node0:5000"

  buyer-frontend:
    build: buyer-frontend
    ports:
      - "8001:5000"
    depends_on:
      products-node0:
        condition: service_healthy
      products-node1:
        condition: service_healthy
      products-node2:
        condition: service_healthy
      products-node3:
        condition: service_healthy
      products-node4:
        condition: service_healthy
      customers-node0:
        condition: service_healthy
      customers-node1:
        condition: service_healthy
      customers-node2:
        condition: service_healthy
      customers-node3:
        condition: service_healthy
      customers-node4:
        condition: service_healthy
    environment:
      PRODUCTS_RPC_ADDRS: "products-node0:5000"
      CUSTOMERS_RPC_ADDRS: "customers-node0:5000"

  # ── Products nodes ────────────────────────────────────────────────────────────

  products-pg0:
    image: postgres:16-alpine
    restart: always
    environment: *products-pg-env
    volumes:
      - products-pgdata0:/var/lib/postgresql/data
    healthcheck: *products-pg-hc

  products-node0:
    build: products-database
    environment:
      <<: *products-node-env
      MEMBER_ID: "0"
      DB_HOST: "products-pg0"
    networks:
      default:
        aliases: [products-node0]
    depends_on:
      products-pg0:
        condition: service_healthy
    healthcheck: *products-node-hc

  products-pg1:
    image: postgres:16-alpine
    restart: always
    environment: *products-pg-env
    volumes:
      - products-pgdata1:/var/lib/postgresql/data
    healthcheck: *products-pg-hc

  products-node1:
    build: products-database
    environment:
      <<: *products-node-env
      MEMBER_ID: "1"
      DB_HOST: "products-pg1"
    networks:
      default:
        aliases: [products-node1]
    depends_on:
      products-pg1:
        condition: service_healthy
    healthcheck: *products-node-hc

  products-pg2:
    image: postgres:16-alpine
    restart: always
    environment: *products-pg-env
    volumes:
      - products-pgdata2:/var/lib/postgresql/data
    healthcheck: *products-pg-hc

  products-node2:
    build: products-database
    environment:
      <<: *products-node-env
      MEMBER_ID: "2"
      DB_HOST: "products-pg2"
    networks:
      default:
        aliases: [products-node2]
    depends_on:
      products-pg2:
        condition: service_healthy
    healthcheck: *products-node-hc

  products-pg3:
    image: postgres:16-alpine
    restart: always
    environment: *products-pg-env
    volumes:
      - products-pgdata3:/var/lib/postgresql/data
    healthcheck: *products-pg-hc

  products-node3:
    build: products-database
    environment:
      <<: *products-node-env
      MEMBER_ID: "3"
      DB_HOST: "products-pg3"
    networks:
      default:
        aliases: [products-node3]
    depends_on:
      products-pg3:
        condition: service_healthy
    healthcheck: *products-node-hc

  products-pg4:
    image: postgres:16-alpine
    restart: always
    environment: *products-pg-env
    volumes:
      - products-pgdata4:/var/lib/postgresql/data
    healthcheck: *products-pg-hc

  products-node4:
    build: products-database
    environment:
      <<: *products-node-env
      MEMBER_ID: "4"
      DB_HOST: "products-pg4"
    networks:
      default:
        aliases: [products-node4]
    depends_on:
      products-pg4:
        condition: service_healthy
    healthcheck: *products-node-hc

  # ── Customers nodes ───────────────────────────────────────────────────────────

  customers-pg0:
    image: postgres:16-alpine
    restart: always
    environment: *customers-pg-env
    volumes:
      - customers-pgdata0:/var/lib/postgresql/data
    healthcheck: *customers-pg-hc

  customers-node0:
    build: customers-database
    environment:
      <<: *customers-node-env
      MEMBER_ID: "0"
      DB_HOST: "customers-pg0"
    networks:
      default:
        aliases: [customers-node0]
    depends_on:
      customers-pg0:
        condition: service_healthy
    healthcheck: *customers-node-hc

  customers-pg1:
    image: postgres:16-alpine
    restart: always
    environment: *customers-pg-env
    volumes:
      - customers-pgdata1:/var/lib/postgresql/data
    healthcheck: *customers-pg-hc

  customers-node1:
    build: customers-database
    environment:
      <<: *customers-node-env
      MEMBER_ID: "1"
      DB_HOST: "customers-pg1"
    networks:
      default:
        aliases: [customers-node1]
    depends_on:
      customers-pg1:
        condition: service_healthy
    healthcheck: *customers-node-hc

  customers-pg2:
    image: postgres:16-alpine
    restart: always
    environment: *customers-pg-env
    volumes:
      - customers-pgdata2:/var/lib/postgresql/data
    healthcheck: *customers-pg-hc

  customers-node2:
    build: customers-database
    environment:
      <<: *customers-node-env
      MEMBER_ID: "2"
      DB_HOST: "customers-pg2"
    networks:
      default:
        aliases: [customers-node2]
    depends_on:
      customers-pg2:
        condition: service_healthy
    healthcheck: *customers-node-hc

  customers-pg3:
    image: postgres:16-alpine
    restart: always
    environment: *customers-pg-env
    volumes:
      - customers-pgdata3:/var/lib/postgresql/data
    healthcheck: *customers-pg-hc

  customers-node3:
    build: customers-database
    environment:
      <<: *customers-node-env
      MEMBER_ID: "3"
      DB_HOST: "customers-pg3"
    networks:
      default:
        aliases: [customers-node3]
    depends_on:
      customers-pg3:
        condition: service_healthy
    healthcheck: *customers-node-hc

  customers-pg4:
    image: postgres:16-alpine
    restart: always
    environment: *customers-pg-env
    volumes:
      - customers-pgdata4:/var/lib/postgresql/data
    healthcheck: *customers-pg-hc

  customers-node4:
    build: customers-database
    environment:
      <<: *customers-node-env
      MEMBER_ID: "4"
      DB_HOST: "customers-pg4"
    networks:
      default:
        aliases: [customers-node4]
    depends_on:
      customers-pg4:
        condition: service_healthy
    healthcheck: *customers-node-hc

volumes:
  products-pgdata0:
  products-pgdata1:
  products-pgdata2:
  products-pgdata3:
  products-pgdata4:
  customers-pgdata0:
  customers-pgdata1:
  customers-pgdata2:
  customers-pgdata3:
  customers-pgdata4: