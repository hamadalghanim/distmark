version: "3.9"

x-products-replica-env: &products-replica-env
  N_MEMBERS: "5"
  PEER_ADDRS: "products-node0:6000,products-node1:6001,products-node2:6002,products-node3:6003,products-node4:6004"
  DB_USER: "user"
  DB_PASS: "pass"
  DB_PORT: "5432"
  DB_NAME: "products"

x-products-pg-env: &products-pg-env
  POSTGRES_USER: "user"
  POSTGRES_PASSWORD: "pass"
  POSTGRES_DB: "products"

x-products-pg-healthcheck: &products-pg-healthcheck
  test: ["CMD-SHELL", "pg_isready -U user -d products"]
  interval: 5s
  timeout: 3s
  retries: 10

x-products-node-healthcheck: &products-node-healthcheck
  test: ["CMD", "python", "-c",
         "import socket; s = socket.create_connection(('localhost', 5000), timeout=2); s.close()"]
  interval: 5s
  timeout: 3s
  retries: 10

services:
  seller-frontend:
    build: seller-frontend
    ports:
      - "8000:5000" # the internal docker port is 5000 but we expose to 8000
    depends_on:
      products-node0:
        condition: service_healthy
      products-node1:
        condition: service_healthy
      products-node2:
        condition: service_healthy
      products-node3:
        condition: service_healthy
      products-node4:
        condition: service_healthy
    environment:
      # gRPC round-robin across all nodes — connect with grpc.insecure_channel("dns:///products-nodes:5000")
      # or pass the list and use: grpc.insecure_channel(",".join(addrs), options=[("grpc.lb_policy_name","round_robin")])
      PRODUCTS_RPC_ADDRS: "products-node0:5000,products-node1:5000,products-node2:5000,products-node3:5000,products-node4:5000"

  buyer-frontend:
    build: buyer-frontend
    ports:
      - "8001:5000" # the internal docker port is 5000 but we expose to 8001
    depends_on:
      products-node0:
        condition: service_healthy
      products-node1:
        condition: service_healthy
      products-node2:
        condition: service_healthy
      products-node3:
        condition: service_healthy
      products-node4:
        condition: service_healthy
      customers-db-rpc:
        condition: service_started
    environment:
      PRODUCTS_RPC_ADDRS: "products-node0:5000,products-node1:5000,products-node2:5000,products-node3:5000,products-node4:5000"

  customers-db-rpc:
    build: customers-database
    depends_on:
      customers-database:
        condition: service_healthy
  customers-database:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: customers
    volumes:
      - ./data/customers:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d customers"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Products nodes

  products-pg0:
    image: postgres:16-alpine
    restart: always
    environment: *products-pg-env
    volumes:
      - products-pgdata0:/var/lib/postgresql/data
    healthcheck: *products-pg-healthcheck

  products-node0:
    build: products-database
    environment:
      <<: *products-replica-env
      MEMBER_ID: "0"
      DB_HOST: "products-pg0"
    networks:
      default:
        aliases: [products-node0]
    depends_on:
      products-pg0:
        condition: service_healthy
    healthcheck: *products-node-healthcheck

  products-pg1:
    image: postgres:16-alpine
    restart: always
    environment: *products-pg-env
    volumes:
      - products-pgdata1:/var/lib/postgresql/data
    healthcheck: *products-pg-healthcheck

  products-node1:
    build: products-database
    environment:
      <<: *products-replica-env
      MEMBER_ID: "1"
      DB_HOST: "products-pg1"
    networks:
      default:
        aliases: [products-node1]
    depends_on:
      products-pg1:
        condition: service_healthy
    healthcheck: *products-node-healthcheck

  products-pg2:
    image: postgres:16-alpine
    restart: always
    environment: *products-pg-env
    volumes:
      - products-pgdata2:/var/lib/postgresql/data
    healthcheck: *products-pg-healthcheck

  products-node2:
    build: products-database
    environment:
      <<: *products-replica-env
      MEMBER_ID: "2"
      DB_HOST: "products-pg2"
    networks:
      default:
        aliases: [products-node2]
    depends_on:
      products-pg2:
        condition: service_healthy
    healthcheck: *products-node-healthcheck

  products-pg3:
    image: postgres:16-alpine
    restart: always
    environment: *products-pg-env
    volumes:
      - products-pgdata3:/var/lib/postgresql/data
    healthcheck: *products-pg-healthcheck

  products-node3:
    build: products-database
    environment:
      <<: *products-replica-env
      MEMBER_ID: "3"
      DB_HOST: "products-pg3"
    networks:
      default:
        aliases: [products-node3]
    depends_on:
      products-pg3:
        condition: service_healthy
    healthcheck: *products-node-healthcheck

  products-pg4:
    image: postgres:16-alpine
    restart: always
    environment: *products-pg-env
    volumes:
      - products-pgdata4:/var/lib/postgresql/data
    healthcheck: *products-pg-healthcheck

  products-node4:
    build: products-database
    environment:
      <<: *products-replica-env
      MEMBER_ID: "4"
      DB_HOST: "products-pg4"
    networks:
      default:
        aliases: [products-node4]
    depends_on:
      products-pg4:
        condition: service_healthy
    healthcheck: *products-node-healthcheck

volumes:
  products-pgdata0:
  products-pgdata1:
  products-pgdata2:
  products-pgdata3:
  products-pgdata4: