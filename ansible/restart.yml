---
- name: Restart containers with new env vars
  hosts: all
  become: yes
  vars:
    ansible_python_interpreter: /usr/bin/python3

  tasks:
    - name: Stop existing container
      docker_container:
        name: "{{ service }}"
        state: absent
      ignore_errors: yes

    - name: Run Docker container with new env vars
      docker_container:
        name: "{{ service }}"
        image: "{{ service }}"
        state: started
        restart_policy: always
        ports: "{{ service_ports | default([]) }}"
        env: "{{ container_env | default({}) }}"
