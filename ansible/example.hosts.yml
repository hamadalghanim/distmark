all:
  vars:
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
    ansible_user: your_user

  children:
    frontends:
      vars:
        container_env:
          CUSTOMERS_RPC_ADDRS: "10.0.1.4:5000,10.0.1.5:5000,10.0.1.6:5000,10.0.1.7:5000,10.0.1.8:5000"
          PRODUCTS_RPC_ADDRS: "10.0.1.10:5000,10.0.1.11:5000,10.0.1.12:5000,10.0.1.13:5000,10.0.1.14:5000"
          WSDL_PAYMENT_HOST: "10.0.1.9"
          WSDL_PAYMENT_PORT: "80"
      hosts:
        customer-frontend:
          ansible_host: 192.168.1.10
          service: buyer-frontend
          service_port: 80
        products-frontend:
          ansible_host: 192.168.1.11
          service: seller-frontend
          service_port: 80

    customers_rpcs:
      vars:
        container_env:
          DB_USER: postgres
          DB_PASS: your_secure_password
          DB_HOST: 10.0.2.13
          DB_PORT: 5432
          DB_NAME: customers
      hosts:
        customers-rpc-0:
          ansible_host: 192.168.1.20
          service: customers-rpc
          member_id: 0
        customers-rpc-1:
          ansible_host: 192.168.1.21
          service: customers-rpc
          member_id: 1
        customers-rpc-2:
          ansible_host: 192.168.1.22
          service: customers-rpc
          member_id: 2
        customers-rpc-3:
          ansible_host: 192.168.1.23
          service: customers-rpc
          member_id: 3
        customers-rpc-4:
          ansible_host: 192.168.1.24
          service: customers-rpc
          member_id: 4

    products_rpcs:
      vars:
        container_env:
          DB_USER: postgres
          DB_PASS: your_secure_password
          DB_HOST: 10.0.2.14
          DB_PORT: 5432
          DB_NAME: products
      hosts:
        products-rpc-0:
          ansible_host: 192.168.1.30
          service: products-rpc
          member_id: 0
        products-rpc-1:
          ansible_host: 192.168.1.31
          service: products-rpc
          member_id: 1
        products-rpc-2:
          ansible_host: 192.168.1.32
          service: products-rpc
          member_id: 2
        products-rpc-3:
          ansible_host: 192.168.1.33
          service: products-rpc
          member_id: 3
        products-rpc-4:
          ansible_host: 192.168.1.34
          service: products-rpc
          member_id: 4

    payments:
      hosts:
        payments-api:
          ansible_host: 192.168.1.40
          service: payments-api
          service_port: 80
