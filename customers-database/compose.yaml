# ── Shared broadcast config (no DB_HOST — each replica has its own) ───────────
x-replica-env: &replica-env
  N_MEMBERS: "5"
  PEER_ADDRS: "replica0:7000,replica1:7000,replica2:7000,replica3:7000,replica4:7000"
  DB_NAME: "customers"

x-replica-healthcheck: &replica-healthcheck
  test: [ "CMD", "python", "-c", "import socket; s = socket.create_connection(('localhost', 5000), timeout=2); s.close()" ]
  interval: 5s
  timeout: 3s
  retries: 10

services:

  replica0:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: replica0
    environment:
      <<: *replica-env
      MEMBER_ID: "0"
    ports:
      - "5001:5000"
    networks:
      broadcast_net:
        aliases: [ replica0 ]
    healthcheck: *replica-healthcheck

  replica1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: replica1
    environment:
      <<: *replica-env
      MEMBER_ID: "1"
    ports:
      - "5002:5000"
    networks:
      broadcast_net:
        aliases: [ replica1 ]
    healthcheck: *replica-healthcheck

  replica2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: replica2
    environment:
      <<: *replica-env
      MEMBER_ID: "2"
    ports:
      - "5003:5000"
    networks:
      broadcast_net:
        aliases: [ replica2 ]
    healthcheck: *replica-healthcheck

  replica3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: replica3
    environment:
      <<: *replica-env
      MEMBER_ID: "3"
    ports:
      - "5004:5000"
    networks:
      broadcast_net:
        aliases: [ replica3 ]
    healthcheck: *replica-healthcheck

  replica4:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: replica4
    environment:
      <<: *replica-env
      MEMBER_ID: "4"
    ports:
      - "5005:5000"
    networks:
      broadcast_net:
        aliases: [ replica4 ]
    healthcheck: *replica-healthcheck

  # Test runner
  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test_runner
    environment:
      REPLICA0_ADDR: "replica0:5000"
      REPLICA1_ADDR: "replica1:5000"
      REPLICA2_ADDR: "replica2:5000"
      REPLICA3_ADDR: "replica3:5000"
      REPLICA4_ADDR: "replica4:5000"
    networks:
      - broadcast_net
    depends_on:
      replica0:
        condition: service_healthy
      replica1:
        condition: service_healthy
      replica2:
        condition: service_healthy
      replica3:
        condition: service_healthy
      replica4:
        condition: service_healthy

    command: [ "python", "-m", "pytest", "tests/test_broadcast.py", "-v", "--tb=short" ]

networks:
  broadcast_net:
    driver: bridge
