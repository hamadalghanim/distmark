# ── Shared broadcast config (no DB_HOST — each replica has its own) ───────────
x-replica-env: &replica-env
  N_MEMBERS: "5"
  PEER_ADDRS: "replica0:6000,replica1:6001,replica2:6002,replica3:6003,replica4:6004"
  DB_USER: "user"
  DB_PASS: "pass"
  DB_PORT: "5432"
  DB_NAME: "customers"

x-postgres-env: &postgres-env
  POSTGRES_USER: "user"
  POSTGRES_PASSWORD: "pass"
  POSTGRES_DB: "customers"

x-postgres-healthcheck: &postgres-healthcheck
  test: ["CMD-SHELL", "pg_isready -U user -d customers"]
  interval: 5s
  timeout: 3s
  retries: 10

x-replica-healthcheck: &replica-healthcheck
  test: ["CMD", "python", "-c",
         "import socket; s = socket.create_connection(('localhost', 5000), timeout=2); s.close()"]
  interval: 5s
  timeout: 3s
  retries: 10
 

services:

  # ── Postgres 0 ───────────────────────────────────────────────────────────────
  postgres0:
    image: postgres:16-alpine
    container_name: postgres0
    environment: *postgres-env
    networks:
      - broadcast_net
    volumes:
      - pgdata0:/var/lib/postgresql/data
    healthcheck: *postgres-healthcheck

  # ── Replica 0 ────────────────────────────────────────────────────────────────
  replica0:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: replica0
    environment:
      <<: *replica-env
      MEMBER_ID: "0"
      DB_HOST: "postgres0"
    ports:
      - "5001:5000"
    networks:
      broadcast_net:
        aliases: [replica0]
    depends_on:
      postgres0:
        condition: service_healthy
    healthcheck: *replica-healthcheck

  # ── Postgres 1 ───────────────────────────────────────────────────────────────
  postgres1:
    image: postgres:16-alpine
    container_name: postgres1
    environment: *postgres-env
    networks:
      - broadcast_net
    volumes:
      - pgdata1:/var/lib/postgresql/data
    healthcheck: *postgres-healthcheck

  # ── Replica 1 ────────────────────────────────────────────────────────────────
  replica1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: replica1
    environment:
      <<: *replica-env
      MEMBER_ID: "1"
      DB_HOST: "postgres1"
    ports:
      - "5002:5000"
    networks:
      broadcast_net:
        aliases: [replica1]
    depends_on:
      postgres1:
        condition: service_healthy
    healthcheck: *replica-healthcheck

  # ── Postgres 2 ───────────────────────────────────────────────────────────────
  postgres2:
    image: postgres:16-alpine
    container_name: postgres2
    environment: *postgres-env
    networks:
      - broadcast_net
    volumes:
      - pgdata2:/var/lib/postgresql/data
    healthcheck: *postgres-healthcheck

  # ── Replica 2 ────────────────────────────────────────────────────────────────
  replica2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: replica2
    environment:
      <<: *replica-env
      MEMBER_ID: "2"
      DB_HOST: "postgres2"
    ports:
      - "5003:5000"
    networks:
      broadcast_net:
        aliases: [replica2]
    depends_on:
      postgres2:
        condition: service_healthy
    healthcheck: *replica-healthcheck

  # ── Postgres 3 ───────────────────────────────────────────────────────────────
  postgres3:
    image: postgres:16-alpine
    container_name: postgres3
    environment: *postgres-env
    networks:
      - broadcast_net
    volumes:
      - pgdata3:/var/lib/postgresql/data
    healthcheck: *postgres-healthcheck

  # ── Replica 3 ────────────────────────────────────────────────────────────────
  replica3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: replica3
    environment:
      <<: *replica-env
      MEMBER_ID: "3"
      DB_HOST: "postgres3"
    ports:
      - "5004:5000"
    networks:
      broadcast_net:
        aliases: [replica3]
    depends_on:
      postgres3:
        condition: service_healthy
    healthcheck: *replica-healthcheck


  # ── Postgres 4 ───────────────────────────────────────────────────────────────
  postgres4:
    image: postgres:16-alpine
    container_name: postgres4
    environment: *postgres-env
    networks:
      - broadcast_net
    volumes:
      - pgdata4:/var/lib/postgresql/data
    healthcheck: *postgres-healthcheck

  # ── Replica 4 ────────────────────────────────────────────────────────────────
  replica4:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: replica4
    environment:
      <<: *replica-env
      MEMBER_ID: "4"
      DB_HOST: "postgres4"
    ports:
      - "5005:5000"
    networks:
      broadcast_net:
        aliases: [replica4]
    depends_on:
      postgres4:
        condition: service_healthy
    healthcheck: *replica-healthcheck

  
  # ── Integration test runner ───────────────────────────────────────────────────
  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test_runner
    environment:
      REPLICA0_ADDR: "replica0:5000"
      REPLICA1_ADDR: "replica1:5000"
      REPLICA2_ADDR: "replica2:5000"
      REPLICA3_ADDR: "replica3:5000"
      REPLICA4_ADDR: "replica4:5000"
    networks:
      - broadcast_net
    depends_on:
      replica0:
        condition: service_healthy
      replica1:
        condition: service_healthy
      replica2:
        condition: service_healthy
      replica3:
        condition: service_healthy
      replica4:
        condition: service_healthy

    command: ["python", "-m", "pytest", "tests/test_broadcast.py", "-v", "--tb=short"]

volumes:
  pgdata0:
  pgdata1:
  pgdata2:
  pgdata3:
  pgdata4:

networks:
  broadcast_net:
    driver: bridge