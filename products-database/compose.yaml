version: "3.9"

# Test compose for products-database (Raft) in isolation.
# Run from the products-database/ directory:
#   docker compose up --build --abort-on-container-exit --exit-code-from test
# Clean volumes:
#   docker compose down -v

x-node-env: &node-env
  RAFT_ADDRS: "products-node0:7000,products-node1:7001,products-node2:7002,products-node3:7003,products-node4:7004"
  DB_USER: "user"
  DB_PASS: "pass"
  DB_PORT: "5432"
  DB_NAME: "products"

x-pg-env: &pg-env
  POSTGRES_USER: "user"
  POSTGRES_PASSWORD: "pass"
  POSTGRES_DB: "products"

x-pg-healthcheck: &pg-healthcheck
  test: ["CMD-SHELL", "pg_isready -U user -d products"]
  interval: 5s
  timeout: 3s
  retries: 10

x-node-healthcheck: &node-healthcheck
  test: ["CMD", "python", "-c",
         "import socket; s = socket.create_connection(('localhost', 5000), timeout=2); s.close()"]
  interval: 5s
  timeout: 3s
  retries: 10

services:

  products-pg0:
    image: postgres:16-alpine
    environment: *pg-env
    volumes:
      - pgdata0:/var/lib/postgresql/data
    healthcheck: *pg-healthcheck

  products-node0:
    build: .
    environment:
      <<: *node-env
      MEMBER_ID: "0"
      DB_HOST: "products-pg0"
    networks:
      default:
        aliases: [products-node0]
    ports:
      - "5000:5000"
    depends_on:
      products-pg0:
        condition: service_healthy
    healthcheck: *node-healthcheck

  products-pg1:
    image: postgres:16-alpine
    environment: *pg-env
    volumes:
      - pgdata1:/var/lib/postgresql/data
    healthcheck: *pg-healthcheck

  products-node1:
    build: .
    environment:
      <<: *node-env
      MEMBER_ID: "1"
      DB_HOST: "products-pg1"
    networks:
      default:
        aliases: [products-node1]
    ports:
      - "5001:5000"
    depends_on:
      products-pg1:
        condition: service_healthy
    healthcheck: *node-healthcheck

  products-pg2:
    image: postgres:16-alpine
    environment: *pg-env
    volumes:
      - pgdata2:/var/lib/postgresql/data
    healthcheck: *pg-healthcheck

  products-node2:
    build: .
    environment:
      <<: *node-env
      MEMBER_ID: "2"
      DB_HOST: "products-pg2"
    networks:
      default:
        aliases: [products-node2]
    ports:
      - "5002:5000"
    depends_on:
      products-pg2:
        condition: service_healthy
    healthcheck: *node-healthcheck

  products-pg3:
    image: postgres:16-alpine
    environment: *pg-env
    volumes:
      - pgdata3:/var/lib/postgresql/data
    healthcheck: *pg-healthcheck

  products-node3:
    build: .
    environment:
      <<: *node-env
      MEMBER_ID: "3"
      DB_HOST: "products-pg3"
    networks:
      default:
        aliases: [products-node3]
    ports:
      - "5003:5000"
    depends_on:
      products-pg3:
        condition: service_healthy
    healthcheck: *node-healthcheck

  products-pg4:
    image: postgres:16-alpine
    environment: *pg-env
    volumes:
      - pgdata4:/var/lib/postgresql/data
    healthcheck: *pg-healthcheck

  products-node4:
    build: .
    environment:
      <<: *node-env
      MEMBER_ID: "4"
      DB_HOST: "products-pg4"
    networks:
      default:
        aliases: [products-node4]
    ports:
      - "5004:5000"
    depends_on:
      products-pg4:
        condition: service_healthy
    healthcheck: *node-healthcheck

  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test_runner
    environment:
      PRODUCTS_NODE0_ADDR: "products-node0:5000"
      PRODUCTS_NODE1_ADDR: "products-node1:5000"
      PRODUCTS_NODE2_ADDR: "products-node2:5000"
      PRODUCTS_NODE3_ADDR: "products-node3:5000"
      PRODUCTS_NODE4_ADDR: "products-node4:5000"
    depends_on:
      products-node0:
        condition: service_healthy
      products-node1:
        condition: service_healthy
      products-node2:
        condition: service_healthy
      products-node3:
        condition: service_healthy
      products-node4:
        condition: service_healthy
    command: ["python", "-m", "pytest", "tests/test_raft.py", "-v", "--tb=short"]

volumes:
  pgdata0:
  pgdata1:
  pgdata2:
  pgdata3:
  pgdata4: